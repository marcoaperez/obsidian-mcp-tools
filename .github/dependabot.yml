# Dependabot configuration — GitHub Actions only.
#
# Policy notes (v6, 2026-05-16):
# - The npm version-update ecosystems were REMOVED. This is a Bun
#   monorepo: Dependabot's npm ecosystem updates `package.json` but
#   does NOT regenerate `bun.lock`, so every npm version-update PR
#   fails CI at `bun install --frozen-lockfile` ("lockfile had
#   changes, but lockfile is frozen"). The realized value (minor /
#   patch dev-tooling currency — majors were already blanket-ignored,
#   and svelte/obsidian/arktype/vite were pinned for non-version
#   reasons) was low and never materialised: only perpetually-broken
#   PRs and triage noise. Dependency currency, when wanted, is done
#   via a deliberate `bun update`, not auto-PRs.
# - Security is NOT weakened: Dependabot security alerts (enabled in
#   repo Settings, independent of this file) still fire, and every
#   release is independently scanned for vulnerable dependencies by
#   the Obsidian community-store automated review.
# - `github-actions` is kept: useful (checkout / setup-bun / attest
#   action currency), majors ignored, and it edits workflow YAML —
#   no lockfile, so none of the Bun problem above applies.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "scope:ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
